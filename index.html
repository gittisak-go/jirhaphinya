<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>จีรหภิณยา — ขนมไทยโบราณ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@300;400;600;700;900&family=Sarabun:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <style>
    /* ── Variables ── */
    :root {
      --gold:    #C9930A;
      --gold-lt: #F0C84A;
      --rose:    #C9556A;
      --rose-lt: #F4A7B3;
      --jade:    #2F7A5A;
      --jade-lt: #7EC9A2;
      --cream:   #FEF6E8;
      --warm:    #F5E8D0;
      --brown:   #3A1F0D;
      --text:    #2C1810;
      --muted:   #8B6E55;
      --white:   #FFFDF8;
      --shadow:  rgba(60,20,0,.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--cream);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── Batik background pattern ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(201,147,10,.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(201,85,106,.07) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 50%, rgba(47,122,90,.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Navbar ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(254,246,232,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,147,10,.2);
      padding: 0 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .nav-logo {
      font-family: 'Noto Serif Thai', serif;
      font-weight: 900;
      font-size: 1.25rem;
      color: var(--brown);
      letter-spacing: .02em;
    }
    .nav-logo span { color: var(--gold); }

    .cart-btn {
      position: relative;
      background: var(--brown);
      color: var(--gold-lt);
      border: none;
      border-radius: 50px;
      padding: .45rem 1rem .45rem .75rem;
      font-family: 'Sarabun', sans-serif;
      font-size: .9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .4rem;
      transition: background .2s, transform .15s;
    }
    .cart-btn:hover { background: #5C3A1E; transform: scale(1.04); }
    .cart-icon { font-size: 1rem; }
    .cart-count {
      background: var(--rose);
      color: #fff;
      border-radius: 50%;
      width: 20px; height: 20px;
      font-size: .7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      animation: pop .25s ease;
    }
    @keyframes pop { 0%{transform:scale(1.6)} 100%{transform:scale(1)} }

    /* ── Hero ── */
    .hero {
      position: relative;
      z-index: 1;
      min-height: 88vw;
      max-height: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 1.5rem 2rem;
      overflow: hidden;
    }

    /* floating dessert circles background */
    .hero-orbs {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      opacity: .18;
      filter: blur(2px);
      animation: drift linear infinite;
    }
    .orb:nth-child(1){ width:120px;height:120px;background:var(--gold);top:5%;left:8%;animation-duration:18s; }
    .orb:nth-child(2){ width:80px;height:80px;background:var(--rose);top:60%;left:3%;animation-duration:24s;animation-delay:-8s; }
    .orb:nth-child(3){ width:160px;height:160px;background:var(--jade);top:10%;right:5%;animation-duration:20s;animation-delay:-4s; }
    .orb:nth-child(4){ width:60px;height:60px;background:var(--gold-lt);top:75%;right:10%;animation-duration:15s;animation-delay:-12s; }
    .orb:nth-child(5){ width:100px;height:100px;background:var(--rose-lt);top:40%;right:2%;animation-duration:22s;animation-delay:-6s; }

    @keyframes drift {
      0%  { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(180deg); }
      100%{ transform: translateY(0) rotate(360deg); }
    }

    .hero-badge {
      background: var(--gold);
      color: var(--brown);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: .25rem .85rem;
      border-radius: 50px;
      margin-bottom: 1rem;
      animation: fadeUp .6s ease both;
    }

    .hero h1 {
      font-family: 'Noto Serif Thai', serif;
      font-weight: 900;
      font-size: clamp(2rem, 8vw, 3.6rem);
      line-height: 1.15;
      color: var(--brown);
      animation: fadeUp .7s .1s ease both;
    }
    .hero h1 .accent { color: var(--gold); }

    .hero-sub {
      font-size: clamp(.85rem, 3vw, 1rem);
      color: var(--muted);
      margin-top: .75rem;
      font-style: italic;
      animation: fadeUp .7s .2s ease both;
    }

    .hero-cta {
      margin-top: 1.75rem;
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp .7s .3s ease both;
    }

    .btn-primary {
      background: var(--brown);
      color: var(--gold-lt);
      border: none;
      border-radius: 50px;
      padding: .7rem 1.75rem;
      font-family: 'Noto Serif Thai', serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s, background .2s;
    }
    .btn-primary:hover { background: #5C3A1E; transform: translateY(-2px); }

    .btn-ghost {
      background: transparent;
      color: var(--brown);
      border: 1.5px solid var(--brown);
      border-radius: 50px;
      padding: .7rem 1.5rem;
      font-family: 'Sarabun', sans-serif;
      font-size: .95rem;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-ghost:hover { background: var(--warm); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Section header ── */
    .section {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1rem 4rem;
    }

    .section-head {
      text-align: center;
      padding: 2.5rem 0 1.75rem;
    }
    .section-head h2 {
      font-family: 'Noto Serif Thai', serif;
      font-weight: 900;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      color: var(--brown);
    }
    .section-head h2 span { color: var(--rose); }
    .divider {
      width: 60px; height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--rose));
      border-radius: 10px;
      margin: .75rem auto 0;
    }

    /* ── Filter pills ── */
    .filters {
      display: flex;
      gap: .5rem;
      overflow-x: auto;
      padding-bottom: .5rem;
      margin-bottom: 1.5rem;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }

    .pill {
      flex-shrink: 0;
      padding: .4rem 1rem;
      border-radius: 50px;
      border: 1.5px solid var(--warm);
      background: var(--white);
      font-family: 'Sarabun', sans-serif;
      font-size: .85rem;
      cursor: pointer;
      transition: all .2s;
      color: var(--muted);
    }
    .pill.active, .pill:hover {
      background: var(--brown);
      border-color: var(--brown);
      color: var(--gold-lt);
    }

    /* ── Menu grid ── */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    /* ── Card ── */
    .card {
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 20px var(--shadow);
      transition: transform .25s, box-shadow .25s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      animation: fadeUp .5s ease both;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(60,20,0,.18);
    }

    /* CSS dessert art */
    .card-art {
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Art per dessert type */
    .art-tub { background: linear-gradient(135deg, #FADADD 0%, #F9B7C3 60%, #F4A0B5 100%); }
    .art-bua { background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 60%, #A5D6A7 100%); }
    .art-chan { background: linear-gradient(135deg, #FFF9C4 0%, #FFECB3 40%, #FFE082 80%, #F5C84A 100%); }
    .art-lod { background: linear-gradient(135deg, #E0F2F1 0%, #B2DFDB 60%, #80CBC4 100%); }
    .art-wun { background: linear-gradient(135deg, #F0FFF4 0%, #D1FAE5 60%, #A7F3D0 100%); }
    .art-mango { background: linear-gradient(135deg, #FFFDE7 0%, #FFF9C4 40%, #FFE57F 100%); }
    .art-khanom { background: linear-gradient(135deg, #FCE4EC 0%, #F8BBD0 60%, #F48FB1 100%); }
    .art-saku { background: linear-gradient(135deg, #E8EAF6 0%, #C5CAE9 60%, #9FA8DA 100%); }

    .art-emoji {
      font-size: 4.5rem;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.15));
      transition: transform .3s;
    }
    .card:hover .art-emoji { transform: scale(1.12) rotate(-5deg); }

    .art-blobs {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      opacity: .35;
    }

    /* tub tim krob blobs */
    .art-tub .blob:nth-child(1){ width:40px;height:40px;background:#E53935;top:20%;left:15%; }
    .art-tub .blob:nth-child(2){ width:28px;height:28px;background:#E53935;top:50%;left:65%; }
    .art-tub .blob:nth-child(3){ width:22px;height:22px;background:#D81B60;top:70%;left:30%; }
    .art-tub .blob:nth-child(4){ width:50px;height:50px;background:#FFFFFF;top:10%;right:10%;opacity:.5; }

    /* bua loi blobs */
    .art-bua .blob:nth-child(1){ width:32px;height:32px;background:#E91E63;top:25%;left:20%; border-radius:50%; }
    .art-bua .blob:nth-child(2){ width:28px;height:28px;background:#FFC107;top:55%;left:55%; }
    .art-bua .blob:nth-child(3){ width:24px;height:24px;background:#4CAF50;top:35%;left:70%; }
    .art-bua .blob:nth-child(4){ width:36px;height:36px;background:#FFFFFF;top:60%;left:15%;opacity:.6; }

    /* khanom chan stripes */
    .art-chan .stripes {
      position:absolute;inset:0;display:flex;flex-direction:column;
    }
    .art-chan .stripe {
      flex:1;
      opacity:.5;
    }
    .art-chan .stripe:nth-child(odd)  { background: rgba(255,255,255,.6); }
    .art-chan .stripe:nth-child(even) { background: rgba(201,147,10,.3); }

    /* lot chong noodles */
    .art-lod .noodle {
      position:absolute;
      width:4px;
      background: #2e7d32;
      border-radius:4px;
      opacity:.5;
      top:0; bottom:0;
    }
    .art-lod .noodle:nth-child(1){ left:20%; height:60%;top:20%; }
    .art-lod .noodle:nth-child(2){ left:35%; height:80%;top:10%; }
    .art-lod .noodle:nth-child(3){ left:50%; height:70%;top:15%; }
    .art-lod .noodle:nth-child(4){ left:65%; height:55%;top:25%; }
    .art-lod .noodle:nth-child(5){ left:80%; height:75%;top:12%; }

    .card-body {
      padding: 1rem 1.1rem 1.15rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: .35rem;
    }

    .card-name {
      font-family: 'Noto Serif Thai', serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--brown);
    }
    .card-eng {
      font-size: .78rem;
      color: var(--muted);
      font-style: italic;
    }
    .card-desc {
      font-size: .83rem;
      color: var(--muted);
      line-height: 1.5;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: .6rem;
    }

    .card-price {
      font-family: 'Noto Serif Thai', serif;
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--gold);
    }
    .card-price span { font-size: .75rem; color: var(--muted); font-weight: 400; }

    .add-btn {
      background: var(--brown);
      color: var(--gold-lt);
      border: none;
      border-radius: 50px;
      width: 36px; height: 36px;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, transform .15s;
      line-height: 1;
    }
    .add-btn:hover { background: var(--rose); transform: rotate(90deg) scale(1.1); }

    /* ── Cart Drawer ── */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(44,24,16,.45);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--white);
      border-radius: 24px 24px 0 0;
      z-index: 201;
      padding: 1.25rem 1.25rem 2rem;
      max-height: 85vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 -8px 40px rgba(60,20,0,.2);
    }
    .drawer.open { transform: translateY(0); }

    .drawer-handle {
      width: 40px; height: 4px;
      background: #DDD;
      border-radius: 10px;
      margin: 0 auto 1.25rem;
    }

    .drawer h3 {
      font-family: 'Noto Serif Thai', serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--brown);
      margin-bottom: 1rem;
    }

    .cart-empty {
      text-align: center;
      padding: 2rem 0;
      color: var(--muted);
      font-size: .95rem;
    }
    .cart-empty .empty-icon { font-size: 3rem; display: block; margin-bottom: .5rem; }

    .cart-item {
      display: flex;
      align-items: center;
      gap: .85rem;
      padding: .75rem 0;
      border-bottom: 1px solid var(--warm);
    }
    .ci-emoji { font-size: 1.8rem; width: 44px; text-align: center; }
    .ci-info { flex: 1; }
    .ci-name {
      font-family: 'Noto Serif Thai', serif;
      font-weight: 600;
      font-size: .95rem;
      color: var(--brown);
    }
    .ci-price { font-size: .82rem; color: var(--muted); }

    .ci-qty {
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .qty-btn {
      background: var(--warm);
      border: none;
      border-radius: 50%;
      width: 28px; height: 28px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--brown);
      transition: background .15s;
    }
    .qty-btn:hover { background: var(--rose-lt); }
    .qty-num {
      font-weight: 700;
      font-size: .9rem;
      min-width: 20px;
      text-align: center;
      color: var(--brown);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 2px solid var(--warm);
    }
    .ct-label {
      font-family: 'Noto Serif Thai', serif;
      font-weight: 600;
      font-size: 1rem;
      color: var(--brown);
    }
    .ct-amount {
      font-family: 'Noto Serif Thai', serif;
      font-weight: 900;
      font-size: 1.4rem;
      color: var(--gold);
    }

    .checkout-btn {
      width: 100%;
      margin-top: 1rem;
      background: linear-gradient(135deg, var(--brown), #5C3A1E);
      color: var(--gold-lt);
      border: none;
      border-radius: 14px;
      padding: 1rem;
      font-family: 'Noto Serif Thai', serif;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }
    .checkout-btn:hover { opacity: .9; transform: translateY(-1px); }
    .checkout-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Order Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(44,24,16,.6);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--white);
      border-radius: 24px;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 400px;
      transform: scale(.92);
      transition: transform .3s;
    }
    .modal-overlay.open .modal { transform: scale(1); }

    .modal h3 {
      font-family: 'Noto Serif Thai', serif;
      font-weight: 900;
      font-size: 1.3rem;
      color: var(--brown);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: .35rem;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: .65rem .9rem;
      border: 1.5px solid var(--warm);
      border-radius: 10px;
      font-family: 'Sarabun', sans-serif;
      font-size: .95rem;
      color: var(--text);
      background: var(--cream);
      transition: border-color .2s;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--gold);
    }

    .modal-actions {
      display: flex;
      gap: .75rem;
      margin-top: 1.5rem;
    }
    .btn-cancel {
      flex: 1;
      padding: .75rem;
      border: 1.5px solid var(--warm);
      border-radius: 12px;
      background: transparent;
      font-family: 'Sarabun', sans-serif;
      font-size: .95rem;
      color: var(--muted);
      cursor: pointer;
    }
    .btn-confirm {
      flex: 2;
      padding: .75rem;
      border: none;
      border-radius: 12px;
      background: var(--brown);
      color: var(--gold-lt);
      font-family: 'Noto Serif Thai', serif;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-confirm:hover { background: #5C3A1E; }

    /* ── Success toast ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--jade);
      color: #fff;
      padding: .75rem 1.5rem;
      border-radius: 50px;
      font-family: 'Sarabun', sans-serif;
      font-weight: 500;
      font-size: .95rem;
      z-index: 400;
      transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0;
      white-space: nowrap;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      background: var(--brown);
      color: var(--warm);
      text-align: center;
      padding: 2.5rem 1.5rem;
    }
    footer .f-logo {
      font-family: 'Noto Serif Thai', serif;
      font-weight: 900;
      font-size: 1.4rem;
      color: var(--gold-lt);
      margin-bottom: .4rem;
    }
    footer .f-sub { font-size: .82rem; color: var(--muted); }
    .f-row {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 1.25rem;
      font-size: .85rem;
      flex-wrap: wrap;
    }
    .f-row a { color: var(--warm); text-decoration: none; opacity: .7; }
    .f-row a:hover { opacity: 1; }
    .f-copy { margin-top: 1.5rem; font-size: .75rem; color: var(--muted); }

    /* ── Responsive ── */
    @media (min-width: 600px) {
      .menu-grid { grid-template-columns: repeat(2, 1fr); }
      .drawer { max-width: 480px; left: 50%; transform: translateX(-50%) translateY(100%); }
      .drawer.open { transform: translateX(-50%) translateY(0); }
    }
    @media (min-width: 900px) {
      .menu-grid { grid-template-columns: repeat(3, 1fr); }
      nav { padding: 0 2.5rem; }
      .section { padding: 0 2rem 5rem; }
    }

    /* stagger cards */
    .card:nth-child(1){ animation-delay:.05s }
    .card:nth-child(2){ animation-delay:.10s }
    .card:nth-child(3){ animation-delay:.15s }
    .card:nth-child(4){ animation-delay:.20s }
    .card:nth-child(5){ animation-delay:.25s }
    .card:nth-child(6){ animation-delay:.30s }
    .card:nth-child(7){ animation-delay:.35s }
    .card:nth-child(8){ animation-delay:.40s }
  </style>
</head>
<body>

<!-- Nav -->
<nav>
  <div class="nav-logo">จีรหภิณยา<span>•</span></div>
  <button class="cart-btn" onclick="openCart()">
    <span class="cart-icon">🛒</span>
    <span id="cart-label">ตะกร้า</span>
    <span class="cart-count" id="cart-count" style="display:none">0</span>
  </button>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-orbs">
    <div class="orb"></div><div class="orb"></div><div class="orb"></div>
    <div class="orb"></div><div class="orb"></div>
  </div>
  <div class="hero-badge">ขนมไทยโบราณ · สูตรต้นตำรับ</div>
  <h1>ความหวาน<br><span class="accent">จากใจไทย</span></h1>
  <p class="hero-sub">วัตถุดิบคัดสรร · ทำสดทุกวัน · ส่งถึงบ้าน</p>
  <div class="hero-cta">
    <button class="btn-primary" onclick="document.getElementById('menu').scrollIntoView({behavior:'smooth'})">สั่งเลย</button>
    <button class="btn-ghost">เกี่ยวกับเรา</button>
  </div>
</section>

<!-- Menu -->
<section class="section" id="menu">
  <div class="section-head">
    <h2>เมนู<span>ขนมไทย</span></h2>
    <div class="divider"></div>
  </div>

  <!-- Filter pills -->
  <div class="filters">
    <button class="pill active" onclick="filterMenu('all', this)">ทั้งหมด</button>
    <button class="pill" onclick="filterMenu('กะทิ', this)">กะทิ</button>
    <button class="pill" onclick="filterMenu('วุ้น', this)">วุ้น/เยลลี่</button>
    <button class="pill" onclick="filterMenu('ข้าว', this)">ข้าว</button>
    <button class="pill" onclick="filterMenu('ลอย', this)">น้ำแข็งใส</button>
  </div>

  <!-- Cards -->
  <div class="menu-grid" id="menu-grid"></div>
</section>

<!-- Cart Drawer -->
<div class="drawer-overlay" id="overlay" onclick="closeCart()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <h3>🛒 ตะกร้าสินค้า</h3>
  <div id="cart-items"></div>
  <div class="cart-total">
    <span class="ct-label">ยอดรวม</span>
    <span class="ct-amount" id="cart-total">฿0</span>
  </div>
  <button class="checkout-btn" id="checkout-btn" onclick="openModal()" disabled>
    สั่งซื้อ →
  </button>
</div>

<!-- Order Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>📦 กรอกข้อมูลการสั่ง</h3>
    <div class="form-group">
      <label>ชื่อผู้สั่ง</label>
      <input type="text" id="f-name" placeholder="ชื่อ - นามสกุล" />
    </div>
    <div class="form-group">
      <label>เบอร์โทร</label>
      <input type="tel" id="f-phone" placeholder="08X-XXX-XXXX" />
    </div>
    <div class="form-group">
      <label>วิธีรับสินค้า</label>
      <select id="f-method">
        <option value="delivery">จัดส่งถึงบ้าน (+30฿)</option>
        <option value="pickup">รับที่ร้าน</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-confirm" onclick="confirmOrder()">ยืนยันคำสั่ง</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">✅ สั่งซื้อสำเร็จ! ขอบคุณมากค่ะ 🙏</div>

<!-- Footer -->
<footer>
  <div class="f-logo">จีรหภิณยา</div>
  <div class="f-sub">ขนมไทยโบราณ สูตรต้นตำรับ</div>
  <div class="f-row">
    <a href="#">หน้าหลัก</a>
    <a href="#">เมนู</a>
    <a href="#">ติดต่อ</a>
    <a href="#">LINE: @jirhaphinya</a>
  </div>
  <div class="f-copy">© 2026 จีรหภิณยา · ขนมไทย</div>
</footer>

<script>
/* ─────────── Data ─────────── */
const ITEMS = [
  {
    id: 1, name: 'ทับทิมกรอบ', eng: 'Crispy Rubies',
    desc: 'แห้วเคลือบแป้งสีแดง ลอยในกะทิสด หวานมัน กรุบกรอบทุกคำ',
    price: 55, emoji: '🔴', art: 'art-tub', tag: 'กะทิ',
    blobs: 4
  },
  {
    id: 2, name: 'บัวลอย', eng: 'Floating Lotus',
    desc: 'ลูกบัวลอยแป้งข้าวเหนียวหลากสี ในน้ำกะทิหอมอุ่น',
    price: 50, emoji: '⚪', art: 'art-bua', tag: 'กะทิ',
    blobs: 4
  },
  {
    id: 3, name: 'ขนมชั้น', eng: 'Layered Steamed Cake',
    desc: 'ขนมนึ่งหลายชั้นสีสวย กลิ่นใบเตยหอม รสหวานมันกลมกล่อม',
    price: 60, emoji: '🟡', art: 'art-chan', tag: 'กะทิ',
    stripes: true
  },
  {
    id: 4, name: 'ลอดช่อง', eng: 'Sweet Rice Jelly',
    desc: 'เส้นวุ้นใบเตยสีเขียว ราดกะทิ น้ำตาลมะพร้าว เย็นชื่นใจ',
    price: 50, emoji: '🟢', art: 'art-lod', tag: 'ลอย',
    noodles: true
  },
  {
    id: 5, name: 'วุ้นมะพร้าว', eng: 'Coconut Jelly',
    desc: 'วุ้นน้ำกะทิสดใส ใส่เนื้อมะพร้าวอ่อน รสอ่อนหวาน เย็นสดชื่น',
    price: 45, emoji: '🥥', art: 'art-wun', tag: 'วุ้น'
  },
  {
    id: 6, name: 'ข้าวเหนียวมะม่วง', eng: 'Mango Sticky Rice',
    desc: 'มะม่วงน้ำดอกไม้สุกหวาน คู่ข้าวเหนียวมูนกะทิ โรยงาขาว',
    price: 80, emoji: '🥭', art: 'art-mango', tag: 'ข้าว'
  },
  {
    id: 7, name: 'ขนมตาล', eng: 'Palm Sugar Cake',
    desc: 'ขนมนึ่งกลิ่นหอมจากลูกตาล หวานธรรมชาติ เนื้อนุ่มเหนียว',
    price: 40, emoji: '🟤', art: 'art-khanom', tag: 'ข้าว'
  },
  {
    id: 8, name: 'สาคูไส้หมู', eng: 'Tapioca Dumplings',
    desc: 'สาคูใสไส้หมูหวานกรอบ กินกับผักชี พริกไทย รสกลมกล่อม',
    price: 65, emoji: '⚫', art: 'art-saku', tag: 'กะทิ'
  },
];

/* ─────────── Cart State ─────────── */
let cart = {}; // { id: qty }

function getCartCount() {
  return Object.values(cart).reduce((a,b) => a+b, 0);
}
function getCartTotal() {
  return ITEMS.reduce((sum, item) => sum + (cart[item.id] || 0) * item.price, 0);
}

/* ─────────── Render Menu ─────────── */
function renderMenu(filter='all') {
  const grid = document.getElementById('menu-grid');
  const filtered = filter === 'all' ? ITEMS : ITEMS.filter(i => i.tag === filter);
  grid.innerHTML = filtered.map(item => `
    <div class="card" onclick="addToCart(${item.id})">
      <div class="card-art ${item.art}">
        <div class="art-blobs">
          ${item.blobs ? Array(item.blobs).fill('<div class="blob"></div>').join('') : ''}
          ${item.stripes ? '<div class="stripes">' + Array(8).fill('<div class="stripe"></div>').join('') + '</div>' : ''}
          ${item.noodles ? Array(5).fill('<div class="noodle"></div>').join('') : ''}
        </div>
        <span class="art-emoji">${item.emoji}</span>
      </div>
      <div class="card-body">
        <div>
          <div class="card-name">${item.name}</div>
          <div class="card-eng">${item.eng}</div>
        </div>
        <div class="card-desc">${item.desc}</div>
        <div class="card-footer">
          <div class="card-price">฿${item.price} <span>/จาน</span></div>
          <button class="add-btn" onclick="event.stopPropagation();addToCart(${item.id})">+</button>
        </div>
      </div>
    </div>
  `).join('');
}

/* ─────────── Filter ─────────── */
function filterMenu(tag, btn) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderMenu(tag);
}

/* ─────────── Cart Actions ─────────── */
function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateCartUI();
  // mini flash
  const countEl = document.getElementById('cart-count');
  countEl.style.animation = 'none';
  requestAnimationFrame(() => { countEl.style.animation = ''; });
}

function changeQty(id, delta) {
  cart[id] = (cart[id] || 0) + delta;
  if (cart[id] <= 0) delete cart[id];
  updateCartUI();
  renderCartItems();
}

function updateCartUI() {
  const count = getCartCount();
  const countEl = document.getElementById('cart-count');
  const label = document.getElementById('cart-label');
  if (count > 0) {
    countEl.style.display = 'flex';
    countEl.textContent = count;
    label.textContent = 'ตะกร้า';
  } else {
    countEl.style.display = 'none';
    label.textContent = 'ตะกร้า';
  }
  document.getElementById('cart-total').textContent = '฿' + getCartTotal();
  document.getElementById('checkout-btn').disabled = count === 0;
}

function renderCartItems() {
  const container = document.getElementById('cart-items');
  const keys = Object.keys(cart).map(Number);
  if (keys.length === 0) {
    container.innerHTML = '<div class="cart-empty"><span class="empty-icon">🧺</span>ยังไม่มีสินค้าในตะกร้า</div>';
    return;
  }
  container.innerHTML = keys.map(id => {
    const item = ITEMS.find(i => i.id === id);
    return `
      <div class="cart-item">
        <div class="ci-emoji">${item.emoji}</div>
        <div class="ci-info">
          <div class="ci-name">${item.name}</div>
          <div class="ci-price">฿${item.price} × ${cart[id]} = ฿${item.price * cart[id]}</div>
        </div>
        <div class="ci-qty">
          <button class="qty-btn" onclick="changeQty(${id},-1)">−</button>
          <span class="qty-num">${cart[id]}</span>
          <button class="qty-btn" onclick="changeQty(${id},1)">+</button>
        </div>
      </div>`;
  }).join('');
  document.getElementById('cart-total').textContent = '฿' + getCartTotal();
}

/* ─────────── Drawer ─────────── */
function openCart() {
  renderCartItems();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeCart() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

/* ─────────── Modal ─────────── */
function openModal() {
  closeCart();
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
function confirmOrder() {
  const name  = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  if (!name || !phone) { alert('กรุณากรอกชื่อและเบอร์โทร'); return; }
  closeModal();
  cart = {};
  updateCartUI();
  showToast();
}

/* ─────────── Toast ─────────── */
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

/* ─────────── Init ─────────── */
renderMenu();
</script>
</body>
</html>
